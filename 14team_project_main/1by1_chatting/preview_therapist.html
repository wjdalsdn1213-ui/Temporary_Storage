<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상담사 채팅 (미리보기)</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #2eb88a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }
    header .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      background: rgba(46, 184, 138, 0.25);
      color: #8ee8c8;
      font-weight: 600;
    }
    header .meta {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      width: 100%;
    }
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      line-height: 1.45;
    }
    .log .row { margin-bottom: 0.5rem; word-break: break-word; }
    .log .meta { color: var(--muted); font-size: 0.78rem; }
    .log .me { color: #c4b5fd; }
    .composer {
      border-top: 1px solid var(--border);
      padding: 0.65rem;
      display: flex;
      gap: 0.5rem;
      background: var(--panel);
    }
    .composer input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
    }
    .composer input:focus { outline: none; border-color: var(--accent); }
    .composer button {
      background: var(--accent);
      border: none;
      color: #0f1419;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .composer button:hover { filter: brightness(1.08); }
    .status {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }
    .status.ok { color: #6ee7b7; }
    .status.err { color: #fca5a5; }
  </style>
</head>
<body>
  <header>
    <h1>상담사</h1>
    <span class="badge">therapist</span>
    <span class="status" id="st">연결 중…</span>
    <p class="meta" id="roomline"></p>
  </header>
  <div class="log" id="log"></div>
  <form class="composer" id="form">
    <input type="text" id="input" placeholder="메시지 입력 후 Enter" autocomplete="off" />
    <button type="submit">보내기</button>
  </form>
  <script>
    var params = new URLSearchParams(location.search);
    var ROOM_ID = params.get("room") || "preview:room:demo";
    var USER_ID = params.get("user") || "therapist-demo-1";

    function chatServerOrigin() {
      var s = params.get("server");
      if (s) return s.replace(/\/$/, "");
      if (location.protocol === "file:") return "http://127.0.0.1:8000";
      if (location.origin && location.origin !== "null") return location.origin;
      return "http://127.0.0.1:8000";
    }
    var CHAT_ORIGIN = chatServerOrigin();

    document.getElementById("roomline").textContent =
      "room=" + ROOM_ID + " · user=" + USER_ID + " · 서버=" + CHAT_ORIGIN + " (?server= 로 변경 가능)";

    var logEl = document.getElementById("log");
    var st = document.getElementById("st");
    var input = document.getElementById("input");
    var form = document.getElementById("form");

    function appendLog(text, cls) {
      var row = document.createElement("div");
      row.className = "row" + (cls ? " " + cls : "");
      row.textContent = text;
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
    }

    var socket = io(CHAT_ORIGIN, {
      path: "/socket.io",
      transports: ["websocket", "polling"],
    });

    socket.on("connect", function () {
      st.textContent = "연결됨";
      st.className = "status ok";
      socket.emit("identify", { user_id: USER_ID, role: "therapist" });
      appendLog("· 본인 확인 요청…", "meta");
    });

    socket.on("disconnect", function () {
      st.textContent = "끊김";
      st.className = "status err";
    });

    socket.on("connect_error", function (err) {
      st.textContent = "연결 실패";
      st.className = "status err";
      var detail = err && err.message ? err.message : String(err || "");
      appendLog("· 연결 오류: " + (detail || "서버가 꺼져 있거나 주소가 잘못됐을 수 있습니다."), "meta");
    });

    socket.on("identified", function (p) {
      appendLog("· 본인 확인: " + p.user_id + " (" + p.role + ")", "meta");
      socket.emit("join_room", { room_id: ROOM_ID });
      appendLog("· 방 입장: " + ROOM_ID, "meta");
    });

    socket.on("joined", function (p) {
      appendLog("· joined: " + p.room_id, "meta");
    });

    socket.on("chat_message", function (msg) {
      var who = msg.me ? "나" : (msg.role === "patient" ? "환자" : "상담사");
      var prefix = msg.me ? "" : (msg.sender_id ? "[" + msg.sender_id + "] " : "");
      appendLog(prefix + who + ": " + msg.text, msg.me ? "me" : "");
    });

    socket.on("error", function (err) {
      appendLog("오류: " + (err.message || JSON.stringify(err)), "meta");
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var t = input.value.trim();
      if (!t) return;
      socket.emit("chat_message", { room_id: ROOM_ID, text: t });
      input.value = "";
    });
  </script>
</body>
</html>
