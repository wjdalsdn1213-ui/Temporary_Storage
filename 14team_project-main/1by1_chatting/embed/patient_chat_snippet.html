<!-- 기존 환자 사이트에 붙일 때: 아래 스크립트만 채팅 영역 근처에 포함 -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
<script>
  (function () {
    const CHAT_SERVER = "http://127.0.0.1:8000"; // 운영 시 실제 채팅 서버 URL
    const roomId = "REPLACE_WITH_ROOM_ID_FROM_YOUR_BACKEND";
    const userId = "REPLACE_WITH_LOGGED_IN_PATIENT_ID";

    const socket = io(CHAT_SERVER, { transports: ["websocket", "polling"] });

    socket.on("connect", () => {
      socket.emit("identify", { user_id: userId, role: "patient" });
    });
    socket.on("identified", () => {
      socket.emit("join_room", { room_id: roomId });
    });

    socket.on("chat_message", (msg) => {
      console.log("수신:", msg);
      // TODO: DOM에 메시지 렌더링
    });

    socket.on("error", (err) => console.warn("채팅 오류:", err));

    window.sendChat = function (text) {
      socket.emit("chat_message", { room_id: roomId, text: text });
    };
  })();
</script>
